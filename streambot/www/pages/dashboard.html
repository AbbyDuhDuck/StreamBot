<html>
<head>
    <title>StreamBot Dashboard</title>

    <meta charset="UTF-8" />
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    
    <script src="static/app.js"></script>
    <link rel="stylesheet" href="static/app.css">
    <script>
    $(document).ready(onLoadWidget('dashboard', '#dashboard-panel'));
    $(document).ready(onLoadWidget('chat', '#chat-panel'));
    </script>
</head>

<body>
    <div class="widget-splitter">
        <div id="chat-panel" class="panel"></div>
        <div id="splitter"></div>
        <div id="dashboard-panel" class="panel grow"></div>
    </div>
</body>

</html>
