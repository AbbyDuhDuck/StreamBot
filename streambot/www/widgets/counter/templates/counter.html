<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Subathon Timer</title>
<style>
  /* Transparent background for OBS */
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: white;
    font-family: Arial, sans-serif;
  }

  .container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    width: 100%;
  }

  .counter {
    font-size: 200px;   /* Adjust for widget size */
    font-weight: bold;
    text-shadow: 10px 10px 20px #000000;
  }
</style>
</head>
<body>

<div class="container">
    <div class="row counter"><span id="counter-count">{{counter_count}}</span> Yahahas!</div>
</div>

<script>

// Connect to the WebSocket server
const ws = new WebSocket("ws://127.0.0.1:13337/ws/counter");

ws.addEventListener("open", () => {
    console.log("Connected to chat WebSocket");
});

// Listen for stop time updates from Python
ws.addEventListener("message", (event) => {
    try {
        const data = JSON.parse(event.data);

        if (data.event === "update") {
            console.log("Received update:", data.message);
            if (data.message['counter-count'] !== undefined)
                $("#counter-count").html(data.message['counter-count']);
        }
    } catch (err) {
        console.error("Failed to parse WS message:", err);
    }
});

ws.addEventListener("close", () => {
    console.log("WebSocket disconnected");
});

</script>
</body>
</html>
