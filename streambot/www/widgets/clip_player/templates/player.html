<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script> 
<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Clip Player</title>

<style>
  /* Transparent background for OBS */
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: white;
    font-family: Arial, sans-serif;
    text-shadow: 2px 2px 4px #000000;
  }

  #clip-container {
    {# display: flex; #}
    {# justify-content: center; #}
    {# align-items: center; #}
    width: {{width}}px;
    height: {{height}}px;
  }
</style>

</head>
<body>

<div id="clip-container"></div>

<script>

function estimateLoadOffset(duration) {
    // base time for iframe + player boot
    const base = 700; // ms

    // scaling factor (clips buffer more when longer)
    const scale = Math.sqrt(duration) * 120;

    // small network safety buffer
    const jitter = 300;

    // final
    const offset = base + scale + jitter;

    // clamp to sane range
    return Math.max(800, Math.min(offset, 3000));
}

function getClipData(url) {
    const parts = url.split("/");

    const clipIndex = parts.indexOf("clip");

    return {
        channel: parts[clipIndex - 1],
        slug: parts[clipIndex + 1]?.split("?")[0]
    };
}

function play_clip(clip, onDone) {
    const params = "&parent=127.0.0.1&autoplay=true&muted=false&controls=false";
    const url = clip.embed_url + params;

    const $container = $('#clip-container');

    // create iframe properly
    const $iframe = $('<iframe>', {
        src: url,
        allowfullscreen: true,
        frameborder: 0,
        scrolling: "no",
        width: "{{width}}px",
        height: "{{height}}px"
    });
    $iframe.hide();

    // replace container content
    $container.empty().append($iframe);

    // wait for iframe to load
    $iframe.on('load', () => {
        console.log("[Clip] iframe loaded");

        // use duration from backend
        const duration = 1000 * (clip.duration || 10);
        const load_offset = estimateLoadOffset(duration);

        console.log("[Clip] duration:", duration);
        console.log("[Clip] plus offset:", duration+load_offset);

        // trigger callback after offset
        setTimeout(() => {
            console.log("[Clip] started");
            $iframe.show();
        }, load_offset);

        // trigger callback after duration
        setTimeout(() => {
            console.log("[Clip] finished");
            $container.empty()

            if (onDone) onDone();
        }, duration+load_offset);
    });
} 

$(document).ready(() => { 
    // Connect to the WebSocket server
    const ws = new WebSocket("ws://127.0.0.1:13337/ws/clip");

    ws.addEventListener("open", () => {
        console.log("Connected to chat WebSocket");
    });

    // Listen for stop time updates from Python
    ws.addEventListener("message", (event) => {
        try {
            const data = JSON.parse(event.data);

            if (data.event === "play-clip") {
                console.log(`Playing Clip: ${data.message.id}`, data.message)
                play_clip(data.message, () => {
                    // on done
                    ws.send(JSON.stringify({
                        event: 'done-clip',
                        data: {id:data.message.id}
                    }));
                })
            }
            if (data.event === "stop-clip") {
                console.log(`Stopping Clip: ${data.message.id}`, data.message)
                $('#clip-container').empty();
            }
            
        } catch (err) {
            console.error("Failed to parse WS message:", err);
        }
    });

    ws.addEventListener("close", () => {
        console.log("WebSocket disconnected");
    });
})
</script>
</body>
</html>
