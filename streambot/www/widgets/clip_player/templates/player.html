<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://player.twitch.tv/js/embed/v1.js"></script>

<title>Clip Player</title>

<style>
  /* Transparent background for OBS */
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: white;
    font-family: Arial, sans-serif;
    text-shadow: 2px 2px 4px #000000;
  }

  .container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    width: 100%;
  }

  .counter {
    font-size: 200px;   /* Adjust for widget size */
    font-weight: bold;
    text-shadow: 10px 10px 20px #000000;
  }
</style>

</head>
<body>

<iframe
    src="https://clips.twitch.tv/embed?clip=CautiousBeautifulHeronArsonNoSexy-RXerO7i80AwfYata&parent=127.0.0.1&autoplay=true&muted=false&controls=false"
    width="640"
    height="360"
    frameborder="0"
    id="twitch-iframe">
</iframe>


<script>

function getClipData(url) {
    const parts = url.split("/");

    const clipIndex = parts.indexOf("clip");

    return {
        channel: parts[clipIndex - 1],
        slug: parts[clipIndex + 1]?.split("?")[0]
    };
}

function play_clip(link) {
    window.addEventListener("message", (event) => {
    // IMPORTANT: always verify origin
    if (!event.origin.includes("twitch")) return;
    //if (!event.origin.includes("twitch.tv")) return;

    console.log("Twitch message:", event.data);
});
}

$(document).ready(() => { 
    // Connect to the WebSocket server
    const ws = new WebSocket("ws://127.0.0.1:13337/ws/counter");

    ws.addEventListener("open", () => {
        console.log("Connected to chat WebSocket");
    });

    // Listen for stop time updates from Python
    ws.addEventListener("message", (event) => {
        try {
            const data = JSON.parse(event.data);

            if (data.event === "update") {
            }
        } catch (err) {
            console.error("Failed to parse WS message:", err);
        }
    });

    ws.addEventListener("close", () => {
        console.log("WebSocket disconnected");
    });
})
</script>
</body>
</html>
